name: Update neofetch card

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - .github/workflows/neofetch.yml
      - neocard/**
      - requirements_prod.txt

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install --disable-pip-version-check -r requirements_prod.txt

      - name: Regenerate cards from the GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          python -m neocard --output-dir dist \
            --user "${{ github.repository_owner }}" \
            --sections identity,system,languages,hobbies,stats \
            --fields uptime,host,kernel,website \
            --stats repos,stars,followers,following,commits,prs,issues \
            --language-sort size \
            --frameworks "React, Vue, Symfony, Phalcon" \
            --real "Polish, English" \
            --hobbies-software "Web apps, Docker automation" \
            --hobbies-hardware "Raspberry Pi, embedded systems" \
            --system "CPU=Meritum 4000 @ 1.77 MHz" \
            --system "GPU=Odra 1305" \
            --system "RAM=48 KB + existential anxiety" \
            --system "WM=Mazovia" \
            --icon "GPU=U+F108" \
            --icon "RAM=U+F035B" \
            --icon "WM=U+F11C"

      - name: Publish cards to the output branch
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: output-neofetch
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
