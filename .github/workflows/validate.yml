name: Validate

on:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Lint
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: check

      - name: Format check
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: format --check

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      - name: Type check
        run: mypy neocard

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v24.0.0
        with:
          globs: "**/*.md"
